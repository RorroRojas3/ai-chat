<!-- Chat Area -->
<div class="chat-area" role="log" aria-live="polite" aria-label="Chat conversation">
  <div class="chat-messages">
    @for (message of storeService.messages(); track trackByMessage($index,
    message)) {
    <app-message-bubble [message]="message"></app-message-bubble>
    } @if (storeService.isStreaming() && !storeService.showStreamLoader()) {
    <app-message-bubble
      [message]="storeService.streamMessage()"
    ></app-message-bubble>
    } @if (storeService.showStreamLoader()) {
    <div class="d-flex justify-content-start">
      <div class="spinner-border streaming-spinner" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
    }
  </div>
</div>

<!-- Prompt Input -->
<div class="prompt-wrapper">
  <app-prompt-box (markdown)="onMarkdownChange($event)"></app-prompt-box>
  <div class="footer-note">AI Assistant can make mistakes. Verify important information.</div>
</div>
